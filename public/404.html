<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gaming</title>
    <!--
      GitHub Pages SPA redirect (rafgraph/spa-github-pages).
      GitHub Pages has no rewrite support, so deep links like /bloodmessage 404.
      This page rewrites the URL into a query string and bounces to index.html,
      where the snippet in <head> restores the real path. Result: clean URLs work.

      pathSegmentsToKeep: 0 for a custom domain or user/org page (site at root).
      Set to 1 if you deploy to a PROJECT page (username.github.io/RepoName).
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
