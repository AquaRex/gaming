<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- Fixed width so phones render the full desktop layout (users can pinch-zoom). -->
    <meta name="viewport" content="width=1400" />
    <title>Gaming</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Blurred trailers cycling behind the list -->
    <div class="bg-trailers" id="bgTrailers" aria-hidden="true"></div>

    <!-- Admin / login controls (filled in by app.js) -->
    <div class="top-controls" id="topControls"></div>

    <!-- The list view -->
    <main class="landing" id="landing">
      <h1 class="brand">Gaming</h1>

      <div class="search">
        <input id="search" type="search" placeholder="Search games, genres, tags…" />
        <button id="releasedToggle" type="button" class="btn">Released</button>
      </div>

      <div class="filter-bar" id="filterBar"></div>

      <div class="list-wrap">
        <div class="legend" id="legend"></div>
        <div id="rows"></div>
      </div>
    </main>

    <!-- Fullscreen game view (hidden until a game is clicked) -->
    <div class="detail hidden" id="detail"></div>

    <!-- Modals (login / add-edit) mount here -->
    <div id="modalRoot"></div>

    <!-- Supabase client, loaded straight from a CDN — no build step -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
